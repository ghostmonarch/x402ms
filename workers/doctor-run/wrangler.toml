name = "monarch-doctor-run"
main = "src/index.js"
compatibility_date = "2026-04-26"

routes = [
  { pattern = "api.x402ms.ai/doctor-run", custom_domain = true },
  { pattern = "api.x402ms.ai/discovery-event", custom_domain = true },
  { pattern = "api.x402ms.ai/health", custom_domain = true },
  { pattern = "api.x402ms.ai/summary", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "monarch_doctor_runs"
database_id = "replace-with-cloudflare-d1-database-id"

name: Monarch Doctor
description: Run Monarch Doctor as payment-code preflight for AI agents using x402, wallet.send, paid MCP, and agent-to-agent payments.
author: Monarch Shield

branding:
  icon: shield
  color: gray-dark

inputs:
  root:
    description: Project directory to scan.
    required: false
    default: "."
  strict:
    description: Fail when no payment flow is detected.
    required: false
    default: "true"
  report:
    description: Report aggregate Doctor run metadata. Set MONARCH_PROJECT_TOKEN in env for project-scoped proof.
    required: false
    default: "false"
  proof-source:
    description: "Proof source for reported runs: internal-dogfood, public-example, or external-reported."
    required: false
    default: ""
  package:
    description: npm package spec to run.
    required: false
    default: "@monarch-shield/x402@0.1.0"
  node-version:
    description: Node.js version used by the Doctor command.
    required: false
    default: "24"
  sarif:
    description: Write SARIF output for GitHub code scanning upload.
    required: false
    default: "false"
  sarif-output:
    description: SARIF output path when sarif is true.
    required: false
    default: "monarch-doctor.sarif"

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run Monarch Doctor
      shell: bash
      env:
        MONARCH_PACKAGE: ${{ inputs.package }}
        MONARCH_ROOT: ${{ inputs.root }}
        MONARCH_STRICT: ${{ inputs.strict }}
        MONARCH_REPORT: ${{ inputs.report }}
        MONARCH_PROOF_SOURCE: ${{ inputs.proof-source }}
        MONARCH_SARIF: ${{ inputs.sarif }}
        MONARCH_SARIF_OUTPUT: ${{ inputs.sarif-output }}
      run: |
        set -euo pipefail

        cmd=(npx --yes "$MONARCH_PACKAGE" doctor --root "$MONARCH_ROOT" --ci)

        if [[ "$MONARCH_STRICT" == "true" ]]; then
          cmd+=(--strict)
        fi

        if [[ "$MONARCH_REPORT" == "true" ]]; then
          cmd+=(--report)
        fi

        if [[ -n "$MONARCH_PROOF_SOURCE" ]]; then
          cmd+=(--proof-source "$MONARCH_PROOF_SOURCE")
        fi

        if [[ "$MONARCH_SARIF" == "true" ]]; then
          cmd+=(--sarif-output "$MONARCH_SARIF_OUTPUT")
        fi

        "${cmd[@]}"
